services:
  db:
    image: pgvector/pgvector:pg16
    container_name: attribute_ai_db
    environment:
      POSTGRES_DB: attribute_ai
      POSTGRES_USER: attribute_ai
      POSTGRES_PASSWORD: attribute_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attribute_ai -d attribute_ai"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: ./backend
    container_name: attribute_ai_api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://attribute_ai:attribute_ai@db:5432/attribute_ai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    container_name: attribute_ai_dashboard
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:
  hf_cache:
